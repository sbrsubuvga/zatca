name: zatca
description: "A Flutter package for generating ZATCA (Saudi Arabia's Zakat, Tax and Customs Authority) compliant invoice XML and QR codes."
version: 0.8.0
homepage: https://github.com/sbrsubuvga/zatca.git
repository: https://github.com/sbrsubuvga/zatca.git
issue_tracker: https://github.com/sbrsubuvga/zatca/issues

environment:
  sdk: ^3.7.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  asn1lib: ^1.6.4
  pointycastle: ^4.0.0
  xml: ^6.5.0
  crypto: ^3.0.6
  intl: ^0.20.2
  convert: ^3.1.2
  basic_utils: ^5.8.2
  uuid: ^4.5.1
  http: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
# (No bundled assets — README screenshots in `assets/` are referenced
# from GitHub raw URLs, not shipped to consumers at runtime.)

funding:
  - https://github.com/sponsors/sbrsubuvga

topics:
  - zatca
  - qr
  - einvoice
  - fatoora
  - phase2